name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'local-backend/**'
      - 'Dockerfile'
      - 'fly.toml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: local-backend/package-lock.json

      - name: Verify dependencies
        working-directory: local-backend
        run: npm ci --omit=dev

      - name: Deploy
        uses: superfly/flyctl-actions@master
        with:
          args: "deploy --remote-only"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
